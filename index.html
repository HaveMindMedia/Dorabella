<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorabella</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--void:#0a0a12;--gold:#c9a84c;--gold-dim:#7a5f2e;--text:#d8d0c0;--text-dim:#8a8070}
body{font-family:Georgia,'Times New Roman',serif;background:var(--void);color:var(--text);min-height:100vh}
.lock-screen{position:fixed;inset:0;z-index:9999;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
.lock-screen.hidden{opacity:0;pointer-events:none}
.lock-box{text-align:center;max-width:320px;padding:40px}
.lock-box h1{font-size:28px;letter-spacing:6px;font-weight:300;color:var(--gold);margin-bottom:4px}
.lock-box .sub{font-size:13px;font-style:italic;color:var(--text-dim);margin-bottom:30px}
.lock-box input{width:100%;padding:10px 14px;margin-bottom:12px;background:#151520;border:1px solid #2a2838;color:var(--text);font-family:Georgia,serif;font-size:15px;text-align:center;border-radius:2px;outline:none;letter-spacing:2px}
.lock-box input:focus{border-color:var(--gold)}
.lock-box input::placeholder{color:#444;font-style:italic;letter-spacing:1px}
.lock-box button{width:100%;padding:10px;margin-top:4px;background:var(--gold-dim);border:none;color:var(--void);font-family:Georgia,serif;font-size:14px;letter-spacing:2px;cursor:pointer;border-radius:2px}
.lock-box button:hover{background:var(--gold)}
.lock-box .error{color:#a44;font-size:12px;margin-top:8px;min-height:18px}
.content{display:none}.content.open{display:block}
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,18,.95);backdrop-filter:blur(8px);border-bottom:1px solid #1a1828;padding:8px 20px;display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap}
.nav button{font-family:Georgia,serif;font-size:12px;padding:5px 14px;background:#1a1828;color:var(--gold);border:1px solid #2a2838;cursor:pointer;border-radius:2px}
.nav button:hover{background:#2a2838}
.nav button.active{background:var(--gold-dim);color:var(--void);border-color:var(--gold)}
.nav .lock-btn{margin-left:auto;color:#666;border-color:#333}
.section{display:none}.section.active{display:block}
.frame-wrap{width:100%;height:calc(100vh - 44px)}
iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <h1>DORABELLA</h1>
    <div class="sub">Private Research — Have Mind Media</div>
    <input type="password" id="passInput" placeholder="password" onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">ENTER</button>
    <div class="error" id="errorMsg"></div>
  </div>
</div>
<div class="content" id="mainContent">
  <div class="nav">
    <button class="active" onclick="showSection('whitepaper',this)">Whitepaper</button>
    <button onclick="showSection('player',this)">Music Box</button>
    <button onclick="showSection('polyphonic',this)">Polyphonic</button>
    <button onclick="showSection('sheet',this)">Sheet Music</button>
    <button class="lock-btn" onclick="lockPage()">&#128274;</button>
  </div>
  <div class="section active" id="sec-whitepaper">
    <div class="frame-wrap"><iframe src="DORABELLA_CIPHER_SOLVED_v2.0_03-17-2026.html"></iframe></div>
  </div>
  <div class="section" id="sec-player">
    <div class="frame-wrap"><iframe src="dorabella_musicbox_v4.0_03-17-2026.html"></iframe></div>
  </div>
  <div class="section" id="sec-polyphonic">
    <div class="frame-wrap"><iframe src="dorabella_salut_polyphonic_v3.0_03-17-2026.html"></iframe></div>
  </div>
  <div class="section" id="sec-sheet">
    <div class="frame-wrap"><iframe src="dorabella_freeform_v4.0_03-17-2026.pdf"></iframe></div>
  </div>
</div>
<script>
const PASS='loUe';
if(sessionStorage.getItem('dora_auth')==='true'){document.getElementById('lockScreen').classList.add('hidden');document.getElementById('mainContent').classList.add('open')}
document.getElementById('passInput').focus();
function unlock(){const v=document.getElementById('passInput').value;if(v===PASS){sessionStorage.setItem('dora_auth','true');document.getElementById('lockScreen').classList.add('hidden');document.getElementById('mainContent').classList.add('open')}else{document.getElementById('errorMsg').textContent='incorrect';document.getElementById('passInput').value='';document.getElementById('passInput').focus()}}
function lockPage(){sessionStorage.removeItem('dora_auth');document.getElementById('lockScreen').classList.remove('hidden');document.getElementById('mainContent').classList.remove('open');document.getElementById('passInput').value='';document.getElementById('passInput').focus()}
function showSection(n,b){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav button:not(.lock-btn)').forEach(b=>b.classList.remove('active'));document.getElementById('sec-'+n).classList.add('active');b.classList.add('active')}
</script>
</body>
</html>
