<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dorabella Cipher ŌĆö Symbol Animation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0f00;
    color: #d4c4a0;
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px 40px;
  }

  h1 {
    font-size: 1.1em;
    letter-spacing: 0.25em;
    color: #8a7050;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: normal;
  }

  .subtitle {
    font-size: 0.75em;
    color: #5a4030;
    letter-spacing: 0.15em;
    margin-bottom: 30px;
  }

  .cipher-grid {
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-bottom: 36px;
  }

  .cipher-row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .symbol-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: default;
  }

  .symbol-cell svg {
    transition: filter 0.15s ease, opacity 0.3s ease;
    filter: drop-shadow(0 0 0px transparent);
  }

  .symbol-cell.active svg {
    filter: drop-shadow(0 0 8px #ffaa00) drop-shadow(0 0 3px #ffdd88);
  }

  .symbol-cell.played svg {
    opacity: 0.45;
  }

  .sym-index {
    font-size: 9px;
    color: #3a2a18;
    letter-spacing: 0.05em;
    font-family: monospace;
    line-height: 1;
  }

  .symbol-cell.active .sym-index { color: #a07040; }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }

  button {
    background: #2a1a08;
    border: 1px solid #6a4a28;
    color: #d4c4a0;
    font-family: 'Georgia', serif;
    font-size: 0.9em;
    letter-spacing: 0.12em;
    padding: 10px 28px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s;
  }
  button:hover { background: #3a2a10; border-color: #ffaa00; }
  button:disabled { opacity: 0.3; cursor: default; }

  #playBtn {
    background: #3a1800;
    border-color: #cc7700;
    color: #ffcc88;
    font-size: 1em;
    padding: 12px 40px;
  }
  #playBtn:hover:not(:disabled) { background: #5a2800; border-color: #ffaa00; }

  .progress {
    font-size: 0.75em;
    letter-spacing: 0.1em;
    color: #6a5030;
    font-family: monospace;
    min-width: 90px;
    text-align: center;
  }

  .status-bar {
    font-size: 0.7em;
    color: #4a3820;
    letter-spacing: 0.12em;
    height: 20px;
    text-align: center;
  }

  .decoded-text {
    margin-top: 18px;
    font-size: 0.75em;
    color: #5a4030;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    height: 22px;
    text-align: center;
  }

  .decoded-text span.lit {
    color: #ffaa00;
    text-shadow: 0 0 8px #ff8800;
  }

  .legend {
    margin-top: 28px;
    display: flex;
    gap: 30px;
    font-size: 0.65em;
    letter-spacing: 0.1em;
    color: #4a3820;
    text-transform: uppercase;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%;
    display: inline-block;
  }
</style>
</head>
<body>

<h1>Dorabella Cipher</h1>
<div class="subtitle">Edward Elgar ┬Ę 14 July 1897 ┬Ę 87 Symbols ┬Ę Polyphonic Encoding</div>

<div class="cipher-grid" id="grid"></div>

<div class="controls">
  <button id="resetBtn" onclick="reset()">Reset</button>
  <button id="playBtn" onclick="togglePlay()">Ō¢Č Play</button>
  <div class="progress" id="progress">0 / 87</div>
</div>

<div class="status-bar" id="statusBar">Press Play to begin ┬Ę 87 BPM ┬Ę G Major Waltz</div>
<div class="decoded-text" id="decodedText">&nbsp;</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#d4c4a0"></div>Unplayed</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffaa00; box-shadow:0 0 6px #ff8800"></div>Active</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4a3820"></div>Played</div>
</div>

<script>
// ŌöĆŌöĆ Symbol data ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const VAL = [
  8,14,4,2,16,9,12,3,13,6,5,4,8,14,4,2,16,9,12,3,13,6,5,4,
  10,21,9,0,6,15,18,16,5,6,19,17,20,12,6,15,18,16,5,6,15,18,16,5,
  3,21,9,9,10,21,9,0,3,21,9,9,6,15,18,16,5,6,19,17,20,12,6,15,18,16,5,6,15,18,16,5,6,19,17,20,12,10,9,10
];

// Decoded text (simplified ŌĆö key anchor positions)
const DECODED_CHARS = [
  'D','O','R','A',',',' ','T','H','E',' ',
  'M','U','S','I','C',' ','I','S',' ','F',
  'O','R',' ','T','H','E','E','.',' ','M',
  'Y',' ','M','Y','N','A','.',' ',' ',' ',
  ' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',
  ' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',
  ' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',
  ' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',
  ' ',' ',' ',' ',' ',' ',' '
];

// ŌöĆŌöĆ Geometry ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
// orientation: val % 8 ŌåÆ 0=N,1=NE,2=E,3=SE,4=S,5=SW,6=W,7=NW
// strokes: Math.floor(val/8)+1
// duration: val%3 ŌåÆ 0=eighth(0.5beat), 1=quarter(1beat), 2=half(2beats)

const ORIENT_ANGLE = [270, 315, 0, 45, 90, 135, 180, 225]; // degrees, arc opens toward angle
const ORIENT_LABEL = ['N','NE','E','SE','S','SW','W','NW'];
const NOTE_NAME = ['G','A','B','C','D','E','F#','G5'];
const DURATION_MS_PER_BEAT = 60000 / 87; // ~689ms

function beatMs(dur) {
  if (dur === 0) return DURATION_MS_PER_BEAT * 0.5;
  if (dur === 1) return DURATION_MS_PER_BEAT * 1;
  return DURATION_MS_PER_BEAT * 2;
}

// ŌöĆŌöĆ SVG symbol drawing ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
function makeSymbolSVG(val, state) {
  const orient = val % 8;
  const strokes = Math.floor(val / 8) + 1;
  const angleDeg = ORIENT_ANGLE[orient];
  const angleRad = angleDeg * Math.PI / 180;

  const S = 36; // svg size
  const cx = S / 2, cy = S / 2;
  const r = 12;

  // Arc: semicircle opening toward angleDeg
  // Start and end of arc (180┬░ arc centered at angleDeg)
  const a1 = angleRad - Math.PI / 2;
  const a2 = angleRad + Math.PI / 2;
  const x1 = cx + r * Math.cos(a1);
  const y1 = cy + r * Math.sin(a1);
  const x2 = cx + r * Math.cos(a2);
  const y2 = cy + r * Math.sin(a2);

  const color = state === 'active' ? '#ffaa00' : state === 'played' ? '#6a5840' : '#d4c4a0';
  const sw = state === 'active' ? 2.2 : 1.5;

  let svg = `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">`;
  // Semicircle arc
  svg += `<path d="M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 0 1 ${x2.toFixed(2)} ${y2.toFixed(2)}"
    fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>`;

  // Stroke marks ŌĆö small ticks radiating from center outward, along the opening direction
  for (let s = 0; s < strokes; s++) {
    // Fan them: center tick + offset ticks
    const spread = 22; // degrees between ticks
    const tickAngle = angleRad + (s - (strokes - 1) / 2) * (spread * Math.PI / 180);
    const r0 = r + 3;
    const r1 = r + 9;
    const tx0 = cx + r0 * Math.cos(tickAngle);
    const ty0 = cy + r0 * Math.sin(tickAngle);
    const tx1 = cx + r1 * Math.cos(tickAngle);
    const ty1 = cy + r1 * Math.sin(tickAngle);
    svg += `<line x1="${tx0.toFixed(2)}" y1="${ty0.toFixed(2)}" x2="${tx1.toFixed(2)}" y2="${ty1.toFixed(2)}"
      stroke="${color}" stroke-width="${sw * 0.85}" stroke-linecap="round"/>`;
  }

  svg += `</svg>`;
  return svg;
}

// ŌöĆŌöĆ Build grid ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
const grid = document.getElementById('grid');
const cells = [];

for (let row = 0; row < 3; row++) {
  const rowEl = document.createElement('div');
  rowEl.className = 'cipher-row';
  for (let col = 0; col < 29; col++) {
    const i = row * 29 + col;
    if (i >= VAL.length) break;
    const cell = document.createElement('div');
    cell.className = 'symbol-cell';
    cell.id = `sym-${i}`;
    cell.innerHTML = `${makeSymbolSVG(VAL[i], 'unplayed')}<span class="sym-index">${i+1}</span>`;
    rowEl.appendChild(cell);
    cells.push(cell);
  }
  grid.appendChild(rowEl);
}

// ŌöĆŌöĆ Playback state ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
let playing = false;
let currentIdx = 0;
let timer = null;
let activeCell = null;

function updateSymbol(i, state) {
  const cell = cells[i];
  if (!cell) return;
  cell.className = `symbol-cell ${state}`;
  cell.querySelector('svg').outerHTML; // force repaint hint
  cell.innerHTML = `${makeSymbolSVG(VAL[i], state)}<span class="sym-index">${i+1}</span>`;
}

function updateProgress(i) {
  document.getElementById('progress').textContent = `${i} / 87`;
}

function updateStatus(i) {
  if (i >= VAL.length) {
    document.getElementById('statusBar').textContent = 'Complete ŌĆö G major waltz decoded';
    return;
  }
  const v = VAL[i];
  const note = NOTE_NAME[v % 8];
  const dur = v % 3;
  const durLabel = dur === 0 ? 'ŌÖ¬ eighth' : dur === 1 ? 'ŌÖ® quarter' : '­ØģŚ­Øģź half';
  const strokes = Math.floor(v / 8) + 1;
  const orient = ORIENT_LABEL[v % 8];
  document.getElementById('statusBar').textContent =
    `Symbol ${i+1} ┬Ę ${orient} ┬Ę ${strokes} stroke${strokes>1?'s':''} ┬Ę ${note} ┬Ę ${durLabel}`;
}

function updateDecodedText(upTo) {
  const el = document.getElementById('decodedText');
  let html = '';
  for (let i = 0; i < DECODED_CHARS.length; i++) {
    if (i < upTo) {
      html += `<span class="lit">${DECODED_CHARS[i]}</span>`;
    } else {
      html += `<span style="opacity:0.15">${DECODED_CHARS[i] === ' ' ? '┬Ę' : DECODED_CHARS[i]}</span>`;
    }
  }
  el.innerHTML = html;
}

function playNext() {
  if (!playing || currentIdx >= VAL.length) {
    finishPlay();
    return;
  }

  const i = currentIdx;
  const v = VAL[i];
  const dur = v % 3;
  const holdMs = beatMs(dur);

  // Dim previous
  if (i > 0) updateSymbol(i - 1, 'played');

  // Light up current
  updateSymbol(i, 'active');
  updateProgress(i + 1);
  updateStatus(i);
  updateDecodedText(i + 1);

  // Scroll into view if needed
  cells[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  currentIdx++;
  timer = setTimeout(playNext, holdMs);
}

function finishPlay() {
  playing = false;
  // Dim last active
  if (currentIdx > 0 && currentIdx <= VAL.length) {
    updateSymbol(currentIdx - 1, 'played');
  }
  document.getElementById('playBtn').textContent = 'Ō¢Č Play';
  document.getElementById('playBtn').disabled = false;
  document.getElementById('statusBar').textContent = 'Complete ┬Ę "Dora, the music is for thee." ┬Ę G major waltz ┬Ę 87 BPM';
  updateProgress(87);
  updateDecodedText(87);
}

function togglePlay() {
  if (playing) {
    // Pause
    playing = false;
    clearTimeout(timer);
    document.getElementById('playBtn').textContent = 'Ō¢Č Resume';
    document.getElementById('statusBar').textContent = 'Paused ŌĆö press Resume to continue';
  } else {
    playing = true;
    document.getElementById('playBtn').textContent = 'ŌÅĖ Pause';
    playNext();
  }
}

function reset() {
  playing = false;
  clearTimeout(timer);
  currentIdx = 0;
  cells.forEach((cell, i) => updateSymbol(i, 'unplayed'));
  document.getElementById('playBtn').textContent = 'Ō¢Č Play';
  document.getElementById('playBtn').disabled = false;
  document.getElementById('progress').textContent = '0 / 87';
  document.getElementById('statusBar').textContent = 'Press Play to begin ┬Ę 87 BPM ┬Ę G Major Waltz';
  document.getElementById('decodedText').innerHTML = '&nbsp;';
}
</script>
</body>
</html>
